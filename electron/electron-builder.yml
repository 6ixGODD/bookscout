appId: com.bookscout.app
productName: BookScout
copyright: Copyright © 2026 BoChen SHEN

directories:
  output: release

files:
  - dist/**/*
  - package.json

extraResources:
  - from: '../python/dist/bookscout-backend'
    to: 'bookscout-backend'
    filter:
      - '**/*'

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  artifactName: 'BookScout-${version}-Setup.${ext}'

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: resources/icon.png
  category: Education
  artifactName: 'BookScout-${version}.${ext}'

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: resources/icon.icns
  category: public.app-category.education
