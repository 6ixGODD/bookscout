[mypy]
python_version = 3.13
namespace_packages = True
explicit_package_bases = True
mypy_path =
    python/bookscout-agents
    python/bookscout-books
    python/bookscout-core
    python/bookscout-doccompiler
    python/bookscout-embedding
    python/bookscout-filestore
    python/bookscout-index-chunk
    python/bookscout-index-graph
    python/bookscout-index-summary
    python/bookscout-llm
    python/bookscout-logging
    python/bookscout-mcp
    python/bookscout-progress
    python/bookscout-repl
    python/bookscout-sqlite
    python/bookscout-tools
    python/bookscout-vectorstore

files = python
exclude = (?x)(
    /tests/
    | /build/
    | __pycache__/
    | \.pyi$
    | /demos/
    )

strict = True

disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_calls = True
disallow_any_generics = True
disallow_subclassing_any = False

warn_unused_ignores = False
warn_return_any = True
warn_unreachable = True
show_error_codes = True

ignore_missing_imports = True
